name: Build Plugin

on:
  push:
    branches: [ '**' ]
    tags: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.extract.outputs.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install webview dependencies
        working-directory: webview
        run: npm ci

      - name: Install ai-bridge dependencies
        working-directory: ai-bridge
        run: npm ci

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Locate plugin zip
        id: extract
        run: |
          ZIP_FILE=$(ls build/distributions/*.zip | head -n 1)
          ZIP_NAME=$(basename "$ZIP_FILE")
          echo "zip-file=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "artifact-name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ steps.extract.outputs.zip-file }}
          if-no-files-found: error
          archive: false

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist
          skip-decompress: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ needs.build.outputs.artifact-name }}
          generate_release_notes: true
