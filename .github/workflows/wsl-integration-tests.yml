name: WSL Integration Tests

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  # Full unit-test suite on Linux. The NodeDetectorWslTest integration tests are
  # Windows+WSL-gated (they Assume Windows+WSL) and are SKIPPED here; they run in
  # the windows-wsl job below so the WSL path behaviour is actually exercised.
  test-linux:
    name: Unit tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install webview dependencies
        working-directory: webview
        run: npm ci

      - name: Install ai-bridge dependencies
        working-directory: ai-bridge
        run: npm ci

      - name: Run tests
        run: ./gradlew test

  # Runs the Windows+WSL integration tests that the Linux job cannot exercise.
  # Vampire/setup-wsl installs a real WSL distro so isWslPath / resolveWslHomeUncPath /
  # resolveHomeForFileOps behave as on a developer's Windows+WSL machine. The tests
  # still Assume WSL availability, so they self-skip if the distro fails to come up
  # rather than producing false failures.
  test-windows-wsl:
    name: WSL integration tests (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'

      - name: Set up WSL
        uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-22.04

      - name: Install Node.js inside WSL
        shell: wsl-bash {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install webview dependencies
        working-directory: webview
        run: npm ci

      - name: Install ai-bridge dependencies
        working-directory: ai-bridge
        run: npm ci

      - name: Run WSL integration tests
        run: ./gradlew test --tests "com.github.claudecodegui.bridge.NodeDetectorWslTest"
