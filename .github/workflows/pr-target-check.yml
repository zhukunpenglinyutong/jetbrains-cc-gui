name: PR Target Branch Check

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

jobs:
  check-target-branch:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check target branch
        uses: actions/github-script@v7
        with:
          script: |
            const checkPrTargetBranch = require('./.github/scripts/check-pr-target-branch.js');
            await checkPrTargetBranch({ github, context, core });
