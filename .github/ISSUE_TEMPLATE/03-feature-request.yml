name: ✨ 功能建议 / Feature Request
description: 提出新功能或改进建议 / Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement", "feat"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请尽量描述清楚使用场景，便于我们评估优先级。
        Thanks for the suggestion! Please describe the use case so we can evaluate priority.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 提交前确认 / Pre-submission Checklist
      options:
        - label: 我已搜索过现有 issue，确认没有类似建议 / I have searched existing issues
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？/ What problem are you trying to solve?
      description: 描述你的使用场景和痛点 / Describe your use case and pain points
      placeholder: |
        例如：
        - 我每天要在多个项目之间切换，但每次都要重新配置 MCP
        - 在做 code review 的时候希望能...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案 / Expected Solution
      description: 描述你希望的功能或行为 / Describe the desired feature
      placeholder: |
        例如：
        - 希望在项目级别保存 MCP 配置，切换项目时自动加载
        - 希望增加一个 code review 模式，可以...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: 其他工具是怎么做的？例如 Cursor、Trae、VSCode、Copilot 等
      placeholder: |
        例如：
        - Cursor 的 .cursorrules 文件可以...
        - Trae 提供了 worktree 功能...

  - type: textarea
    id: screenshots
    attributes:
      label: 参考截图 / Reference Screenshots
      description: 其他工具的截图或设计草图（可选）/ Screenshots from other tools (optional)

  - type: dropdown
    id: priority
    attributes:
      label: 这个功能对你的重要程度 / Priority for You
      options:
        - 必须有（影响日常使用）/ Must-have
        - 强烈希望 / Strongly desired
        - 锦上添花 / Nice-to-have
    validations:
      required: true

  - type: dropdown
    id: contribute
    attributes:
      label: 是否愿意贡献代码？/ Willing to contribute?
      description: 我们欢迎社区贡献！如果你愿意提 PR，请告诉我们
      options:
        - 是 - 我可以提 PR / Yes, I can submit a PR
        - 是 - 但需要指导 / Yes, but I need guidance
        - 否 - 仅提建议 / No, suggestion only
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息 / Additional Context
      description: 其他相关信息
